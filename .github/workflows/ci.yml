name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Install ruff
        run: uv tool install ruff

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Run linter
        run: uv tool run ruff check .